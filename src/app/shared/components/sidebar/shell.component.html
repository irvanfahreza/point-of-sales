<!-- Shell Layout -->
<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- ========================= SIDEBAR (Desktop/Tablet & Mobile Drawer) ========================= -->
  <!-- Backdrop for Mobile -->
  <div *ngIf="mobileMenuOpen" (click)="mobileMenuOpen = false"
       class="md:hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 transition-opacity">
  </div>

  <aside class="fixed md:relative inset-y-0 left-0 z-50 flex flex-col bg-white border-r border-gray-100 shadow-xl md:shadow-sm transition-all duration-300 transform md:transform-none"
         [class.translate-x-0]="mobileMenuOpen"
         [class.-translate-x-full]="!mobileMenuOpen"
         [class.md:translate-x-0]="true"
         [class.w-72]="mobileMenuOpen"
         [class.w-64]="!mobileMenuOpen && sidebarOpen"
         [class.md:w-64]="sidebarOpen"
         [class.md:w-16]="!sidebarOpen">

    <!-- Logo -->
    <div class="flex items-center h-16 px-4 border-b border-gray-100 shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-9 h-9 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/>
          </svg>
        </div>
        <span *ngIf="sidebarOpen || mobileMenuOpen" class="font-bold text-gray-900 text-sm truncate">Culinary Lab POS</span>
      </div>
      <!-- Desktop Toggle -->
      <button (click)="sidebarOpen = !sidebarOpen" class="hidden md:block ml-auto text-gray-400 hover:text-gray-700 p-1.5 rounded-lg hover:bg-gray-100 transition-colors shrink-0">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <!-- Mobile Close -->
      <button (click)="mobileMenuOpen = false" class="md:hidden ml-auto text-gray-400 hover:text-gray-700 p-1.5 rounded-lg hover:bg-gray-100 transition-colors shrink-0">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Nav Items -->
    <nav class="flex-1 overflow-y-auto py-4 px-2 space-y-0.5">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: !!item.exact }"
         (click)="mobileMenuOpen = false"
         class="sidebar-item"
         [title]="item.label">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
        </svg>
        <span *ngIf="sidebarOpen || mobileMenuOpen" class="truncate text-sm">{{ item.label }}</span>
      </a>
    </nav>

    <!-- User Info + Logout -->
    <div class="border-t border-gray-100 p-3 shrink-0 bg-white">
      <div class="flex items-center gap-2" *ngIf="sidebarOpen || mobileMenuOpen">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center text-white text-xs font-bold shrink-0">
          {{ user?.username?.charAt(0)?.toUpperCase() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-800 truncate">{{ user?.username }}</p>
          <p class="text-xs text-gray-400">Administrator</p>
        </div>
        <button (click)="logout()" class="text-gray-400 hover:text-red-500 p-1.5 rounded-lg hover:bg-red-50 transition-colors" title="Keluar">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
      <button *ngIf="!sidebarOpen && !mobileMenuOpen" (click)="logout()" class="w-full flex items-center justify-center text-gray-400 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors" title="Keluar">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ========================= MAIN CONTENT ========================= -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative z-0">
    <!-- Top Navbar (mobile) -->
    <header class="md:hidden flex items-center h-14 bg-white border-b border-gray-100 px-4 shrink-0 shadow-sm relative z-10">
      <button (click)="mobileMenuOpen = true" class="mr-3 text-gray-500 hover:text-indigo-600 p-1 -ml-1 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-md flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/>
          </svg>
        </div>
        <span class="font-bold text-gray-900 text-sm tracking-tight">Culinary Lab</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto pb-20 md:pb-0 bg-gray-50">
      <div class="page-enter">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- ========================= BOTTOM NAV (Mobile) ========================= -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-2xl z-40 flex">
    <a *ngFor="let item of bottomNavItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: !!item.exact }"
       class="bottom-nav-item text-xs">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
      </svg>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <!-- ========================= TOAST CONTAINER ========================= -->
  <div class="fixed top-4 right-4 md:top-4 md:right-4 z-50 flex flex-col gap-2 max-w-sm w-full px-4 md:px-0">
    <div *ngFor="let toast of toasts" [class]="'toast ' + toastClass(toast.type)">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path *ngIf="toast.type === 'success'" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        <path *ngIf="toast.type === 'error'" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        <path *ngIf="toast.type === 'warning'" stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        <path *ngIf="toast.type === 'info'" stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-sm flex-1">{{ toast.message }}</p>
      <button (click)="removeToast(toast.id)" class="text-white/70 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>
