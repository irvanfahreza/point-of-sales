<!-- Login Page -->
<div class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-violet-900 flex items-center justify-center p-4">
  <!-- Background decorations -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-violet-500/20 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white/10 backdrop-blur-sm rounded-3xl mb-4 border border-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">Culinary Lab POS</h1>
      <p class="text-white/60 mt-1">Masuk ke sistem kasir</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20 shadow-2xl">
      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="mb-5 p-4 bg-red-500/20 border border-red-400/40 rounded-2xl flex items-center gap-3">
        <svg class="w-5 h-5 text-red-300 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
        </svg>
        <p class="text-red-200 text-sm font-medium">{{ errorMessage }}</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Username -->
        <div>
          <label class="block text-white/80 text-sm font-semibold mb-2">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Masukkan username"
            class="w-full bg-white/10 border-2 border-white/20 rounded-xl px-4 py-3.5 text-white placeholder-white/40
                   focus:border-white/50 focus:ring-2 focus:ring-white/20 outline-none transition-all
                   text-base min-h-[48px]"
            [class.border-red-400]="username?.invalid && username?.touched"
          />
          <p *ngIf="username?.invalid && username?.touched" class="text-red-300 text-xs mt-1">Username tidak boleh kosong</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-white/80 text-sm font-semibold mb-2">Password</label>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Masukkan password"
              class="w-full bg-white/10 border-2 border-white/20 rounded-xl px-4 py-3.5 pr-12 text-white placeholder-white/40
                     focus:border-white/50 focus:ring-2 focus:ring-white/20 outline-none transition-all
                     text-base min-h-[48px]"
              [class.border-red-400]="password?.invalid && password?.touched"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white/80 transition-colors p-1"
            >
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <p *ngIf="password?.invalid && password?.touched" class="text-red-300 text-xs mt-1">Password tidak boleh kosong</p>
        </div>

        <!-- Submit -->
        <button
          id="login-btn"
          type="submit"
          [disabled]="loading"
          class="w-full bg-white text-indigo-700 font-bold py-4 rounded-xl
                 hover:bg-indigo-50 active:scale-95 transition-all duration-200
                 shadow-lg min-h-[52px] text-base disabled:opacity-60 disabled:cursor-not-allowed
                 flex items-center justify-center gap-2 mt-2"
        >
          <svg *ngIf="loading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          {{ loading ? 'Sedang Masuk...' : 'Masuk' }}
        </button>
      </form>
    </div>

    <p class="text-center text-white/40 text-xs mt-6">
      © 2025 Culinary Lab POS · Hak cipta dilindungi
    </p>
  </div>
</div>
