<!-- Settings Page -->
<div class="p-4 sm:p-6 max-w-2xl mx-auto">
  <div class="page-header">
    <h1 class="page-title">Pengaturan Toko</h1>
  </div>

  <div *ngIf="loading" class="space-y-4">
    <div *ngFor="let i of [1,2,3,4]" class="skeleton h-14 rounded-xl"></div>
  </div>

  <div *ngIf="!loading" class="space-y-5">
    <!-- Logo Upload -->
    <div class="card">
      <h2 class="font-semibold text-gray-800 mb-4">Logo Toko</h2>
      <div class="flex items-center gap-5">
        <div class="w-20 h-20 rounded-2xl overflow-hidden bg-gray-100 flex items-center justify-center border-2 border-dashed border-gray-300 shrink-0">
          <img *ngIf="logoUrl" [src]="logoUrl" alt="Logo" class="w-full h-full object-contain"/>
          <svg *ngIf="!logoUrl" class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <label for="logoInput" class="btn-secondary cursor-pointer text-sm py-2 px-4 inline-block">
            {{ uploadingLogo ? 'Mengunggah...' : 'Pilih Logo' }}
          </label>
          <input type="file" id="logoInput" accept="image/*" class="hidden" (change)="onLogoChange($event)" [disabled]="uploadingLogo"/>
          <p class="text-xs text-gray-400 mt-1.5">Format: JPG, PNG, WebP. Maks 2MB</p>
        </div>
      </div>
    </div>

    <!-- Store Info Form -->
    <form [formGroup]="form" (ngSubmit)="save()" class="card space-y-5">
      <h2 class="font-semibold text-gray-800">Informasi Toko</h2>

      <div>
        <label class="form-label">Nama Toko *</label>
        <input formControlName="storeName" type="text" class="form-input" placeholder="Contoh: Culinary Lab POS"
               [class.border-red-400]="f['storeName'].invalid && f['storeName'].touched"/>
        <p *ngIf="f['storeName'].invalid && f['storeName'].touched" class="text-red-500 text-xs mt-1">Nama toko wajib diisi</p>
      </div>

      <div>
        <label class="form-label">Alamat</label>
        <textarea formControlName="address" rows="2" class="form-input resize-none" placeholder="Alamat toko"></textarea>
      </div>

      <div>
        <label class="form-label">Nomor Telepon</label>
        <input formControlName="phone" type="text" class="form-input" placeholder="Contoh: 021-12345678"/>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="form-label">PPN / Pajak (%)</label>
          <input formControlName="taxRate" type="number" min="0" max="100" step="0.1" class="form-input"/>
          <p class="text-xs text-gray-400 mt-1">0 = tanpa pajak</p>
        </div>
        <div>
          <label class="form-label">Batas Stok Rendah (Global)</label>
          <input formControlName="lowStockThreshold" type="number" min="0" class="form-input"/>
          <p class="text-xs text-gray-400 mt-1">Notifikasi stok menipis</p>
        </div>
      </div>

      <div>
        <label class="form-label">Footer Struk</label>
        <textarea formControlName="receiptFooter" rows="2" class="form-input resize-none" placeholder="Contoh: Terima kasih sudah berkunjung!"></textarea>
      </div>

      <button type="submit" [disabled]="saving" class="btn-primary w-full">
        {{ saving ? 'Menyimpan...' : 'Simpan Pengaturan' }}
      </button>
    </form>
  </div>
</div>
